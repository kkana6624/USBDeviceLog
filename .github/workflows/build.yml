name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore USBDeviceLogApp.csproj -r win-x64

    - name: Build and Publish
      run: dotnet publish USBDeviceLogApp.csproj --configuration Release -r win-x64 --self-contained true --output ${{ github.workspace }}\publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: USBDeviceLogApp-Release
        path: ${{ github.workspace }}\publish

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: publish/USBDeviceLogApp.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
